<!DOCTYPE html>
<html lang="de">
<head>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23C18A3E'/></svg>" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:wght@700;800&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; height:100%; }
body { display:flex; flex-direction:column; background:var(--ink); color:var(--onink); font-family:'Work Sans',sans-serif; overscroll-behavior:none; }
.spin { animation:spin 1s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }

header { background:var(--ink2); border-bottom:2px solid var(--brassd); padding:calc(env(safe-area-inset-top) + 12px) 16px 8px; flex-shrink:0; }

.htitle { font-family:'Big Shoulders Stencil',sans-serif; font-weight:800; font-size:17px; line-height:1.05; letter-spacing:.5px; color:var(--brassl); flex:1; }

.iconbtn { background:transparent; border:1px solid var(--brassd); color:var(--muted); border-radius:8px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; padding:0; cursor:pointer; font-size:14px; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:14px 10px; }

<nav>

  <button class="navbtn" data-view="add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>Hinzufügen</span></button>
  <button class="navbtn" data-view="compare"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg><span>Fund prüfen</span></button>

<script>
"use strict";
/* ================= Config ================= */
const THUMB_DIM = 64, THUMB_Q = .55;
const STORE_DIM = 512, STORE_Q = .7;
const HASH_N = 16;              // dHash grid → 16×16 = 256 bit
const SHORTLIST = 8;            // candidates shown / sent to AI
const STRONG = .90, POSSIBLE = .80;
const EXPORT_VER = 3;
const AI_MODEL = "claude-sonnet-4-6";

/* ================= IndexedDB ================= */
let db;
function openDB() {
  return new Promise((res, rej) => {
    const rq = indexedDB.open("kronenkorken", 1);
    rq.onupgradeneeded = () => {
      const d = rq.result;
      if (!d.objectStoreNames.contains("caps")) d.createObjectStore("caps", { keyPath: "id" });
      if (!d.objectStoreNames.contains("settings")) d.createObjectStore("settings", { keyPath: "key" });
    };
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error || new Error("IndexedDB nicht verfügbar."));
  });
}
function tx(store, mode, fn) {
  return new Promise((res, rej) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const out = fn(s);
    t.oncomplete = () => res(out && out.result !== undefined ? out.result : undefined);
    t.onerror = () => rej(t.error);
  });
}
const dbPutCap    = cap => tx("caps", "readwrite", s => s.put(cap));
const dbDeleteCap = id  => tx("caps", "readwrite", s => s.delete(id));
const dbClearCaps = ()  => tx("caps", "readwrite", s => s.clear());
function dbAllCaps() {
  return new Promise((res, rej) => {
    const t = db.transaction("caps", "readonly");
    const rq = t.objectStore("caps").getAll();
    rq.onsuccess = () => res(rq.result || []);
    rq.onerror = () => rej(rq.error);
  });
}
function dbGetSetting(key) {
  return new Promise((res) => {
    const t = db.transaction("settings", "readonly");
    const rq = t.objectStore("settings").get(key);
    rq.onsuccess = () => res(rq.result ? rq.result.value : null);
    rq.onerror = () => res(null);
  });
}
const dbSetSetting = (key, value) => tx("settings", "readwrite", s => s.put({ key, value }));

/* ================= State ================= */
let caps = [];           // [{id, brand, country, createdAt, image, thumb, hash(base64), avg[r,g,b]}]
let view = "gallery";
let addPhoto = null, cmpPhoto = null, sessionCount = 0;
let apiKey = null;

/* ================= Utils ================= */
const $ = id => document.getElementById(id);
const esc = s => (s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), msg.length > 60 ? 7000 : 3200);
}
function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onerror = () => rej(new Error("Datei konnte nicht gelesen werden."));
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error("Bild konnte nicht geladen werden."));
    img.src = src;
  });
}
async function resizeDataUrl(src, maxDim, q) {
  const img = await loadImage(src);
  let { width, height } = img;
  if (width >= height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
  else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
  const c = document.createElement("canvas");
  c.width = width; c.height = height;
  c.getContext("2d").drawImage(img, 0, 0, width, height);
  return c.toDataURL("image/jpeg", q);
}
function dataUrlParts(u) {
  const [h, b] = (u || "").split(",");
  return { media: ((h || "").match(/data:(.*);base64/) || [])[1] || "image/jpeg", base64: b || "" };
}

/* ================= Perceptual hash (dHash + avg colour) ================= */
async function computeSignature(dataUrl) {
  const img = await loadImage(dataUrl);
  const N = HASH_N;
  const c = document.createElement("canvas");
  c.width = N + 1; c.height = N;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  // centre-crop square (caps are round; edges are background)
  const s = Math.min(img.width, img.height);
  const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
  ctx.drawImage(img, sx, sy, s, s, 0, 0, N + 1, N);
  const px = ctx.getImageData(0, 0, N + 1, N).data;
  const gray = new Float32Array((N + 1) * N);
  let r = 0, g = 0, b = 0;
  for (let i = 0; i < px.length; i += 4) {
    gray[i / 4] = px[i] * .299 + px[i + 1] * .587 + px[i + 2] * .114;
    r += px[i]; g += px[i + 1]; b += px[i + 2];
  }
  const n = px.length / 4;
  const bits = new Uint8Array(Math.ceil(N * N / 8));
  let bit = 0;
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (gray[y * (N + 1) + x] > gray[y * (N + 1) + x + 1]) bits[bit >> 3] |= 1 << (bit & 7);
    bit++;
  }
  return { hash: btoa(String.fromCharCode(...bits)), avg: [r / n, g / n, b / n] };
}
function hashSim(h1, h2) {
  const a = atob(h1), b = atob(h2);
  if (a.length !== b.length) return 0;
  let dist = 0;
  for (let i = 0; i < a.length; i++) {
    let x = a.charCodeAt(i) ^ b.charCodeAt(i);
    while (x) { dist++; x &= x - 1; }
  }
  return 1 - dist / (HASH_N * HASH_N);
}
function colorSim(a, b) {
  if (!a || !b) return .5;
  const d = Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
  return Math.max(0, 1 - d / 220);
}
const score = (a, b) => .72 * hashSim(a.hash, b.hash) + .28 * colorSim(a.avg, b.avg);

/* ================= AI compare (optional) ================= */
function makeGrid(items, cell = 96) {
  return new Promise(async (res) => {
    const cols = Math.min(4, items.length), rows = Math.ceil(items.length / cols);
    const LH = 16, GAP = 3;
    const c = document.createElement("canvas");
    c.width = cols * (cell + GAP); c.height = rows * (cell + LH + GAP);
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, c.width, c.height);
    for (let i = 0; i < items.length; i++) {
      const x = (i % cols) * (cell + GAP), y = Math.floor(i / cols) * (cell + LH + GAP);
      try { ctx.drawImage(await loadImage(items[i].image), x, y, cell, cell); }
      catch { ctx.fillStyle = "#222"; ctx.fillRect(x, y, cell, cell); }
      ctx.fillStyle = "rgba(0,0,0,.7)"; ctx.fillRect(x, y + cell - LH, cell, LH);
      ctx.fillStyle = "#edc97a"; ctx.font = "bold 12px monospace"; ctx.textAlign = "center";
      ctx.fillText(String(i + 1), x + cell / 2, y + cell - 4);
    }
    res(c.toDataURL("image/jpeg", .82));
  });
}
async function aiCompare(newUrl, candidates) {
  const gridUrl = await makeGrid(candidates);
  const n = dataUrlParts(newUrl), g = dataUrlParts(gridUrl);
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: AI_MODEL, max_tokens: 120,
      messages: [{ role: "user", content: [
        { type: "text", text:
          "Erstes Bild: Foto eines gefundenen Kronenkorkens. Zweites Bild: nummeriertes Raster mit " + candidates.length + " katalogisierten Kronenkorken.\n" +
          "Vergleiche rein visuell (Logo, Farben, Schriftzug, Layout; Beleuchtung/Winkel ignorieren).\n" +
          'Antworte NUR mit JSON: {"match": <Nummer 1–' + candidates.length + ' oder null>, "confidence": "hoch"|"mittel"|"niedrig"}' },
        { type: "image", source: { type: "base64", media_type: n.media, data: n.base64 } },
        { type: "image", source: { type: "base64", media_type: g.media, data: g.base64 } },
      ]}],
    }),
  });
  let data;
  try { data = await res.json(); } catch { throw new Error("KI-Antwort unlesbar."); }
  if (!res.ok) throw new Error((data.error && data.error.message) || ("HTTP " + res.status));
  const text = (data.content || []).map(b => b.text || "").join("\n");
  const m = text.replace(/```json|```/g, "").match(/\{[\s\S]*\}/);
  return JSON.parse(m ? m[0] : text);
}

/* ================= Cap frame rendering ================= */
function scallopPath(cx, cy, baseR, amp, teeth, steps = 200) {
  let d = "";
  for (let i = 0; i <= steps; i++) {
    const t = i / steps * Math.PI * 2;
    const r = baseR + amp * Math.cos(teeth * t);
    d += (i ? "L " : "M ") + (cx + r * Math.cos(t)).toFixed(2) + " " + (cy + r * Math.sin(t)).toFixed(2) + " ";
  }
  return d + "Z";
}
const CAP_PATH = scallopPath(50, 50, 42, 6.2, 21);
let gradN = 0;
function capFrame(src, size) {
  const gid = "gr" + (gradN++);
  const inset = Math.round(size * .135);
  return '<div class="capframe" style="width:' + size + 'px;height:' + size + 'px">' +
    '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '">' +
    '<defs><linearGradient id="' + gid + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
    '<stop offset="0%" stop-color="#E8C07C"/><stop offset="55%" stop-color="#BB823B"/><stop offset="100%" stop-color="#7C5824"/>' +
    '</linearGradient></defs>' +
    '<path d="' + CAP_PATH + '" fill="url(#' + gid + ')" stroke="#5A3E16" stroke-width="1.1"/></svg>' +
    '<div class="capinner" style="inset:' + inset + 'px">' +
    (src ? '<img src="' + src + '" alt="">' : '<span style="font-size:' + Math.round(size * .3) + 'px">📷</span>') +
    '</div></div>';
}

/* ================= Gallery ================= */
function renderCount() { $("count").textContent = caps.length.toLocaleString("de-DE"); }
function renderGallery() {
  const q = $("searchInput").value.trim().toLowerCase();
  const asc = [...caps].sort((a, b) => a.createdAt - b.createdAt);
  const num = {}; asc.forEach((c, i) => num[c.id] = i + 1);
  const list = [...caps].sort((a, b) => b.createdAt - a.createdAt)
    .filter(c => !q || (c.brand + " " + c.country).toLowerCase().includes(q));
  const root = $("galleryContent");
  if (caps.length === 0) {
    root.innerHTML = '<div class="empty">' + capFrame(null, 84) +
      '<p>Noch keine Kronenkorken.<br>Fotografiere den ersten oder lade eine Sicherung.</p>' +
      '<button class="btn b-outline" onclick="openBackup()">⇅ Sicherung laden</button></div>';
    return;
  }
  if (list.length === 0) { root.innerHTML = '<div class="empty"><p>Kein Treffer für „' + esc(q) + '".</p></div>'; return; }
  root.innerHTML = '<div class="grid">' + list.map(c =>
    '<button class="cell" onclick="openDetail(\'' + c.id + '\')">' +
    '<span class="cellno">' + String(num[c.id]).padStart(4, "0") + '</span>' +
    capFrame(c.thumb, 72) +
    '<span class="cellbrand">' + esc(c.brand) || "" + '</span>'.replace("><", ">" + (esc(c.brand) || "Ohne Namen") + "<") +
    (c.country ? '<span class="cellcountry">' + esc(c.country) + '</span>' : "") +
    '</button>').join("") + '</div>';
}

/* ================= Views / nav ================= */
function switchView(v) {
  view = v;
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  $("view-" + v).classList.add("active");
  document.querySelectorAll(".navbtn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  if (v === "gallery") renderGallery();
}
document.querySelectorAll(".navbtn").forEach(b => b.addEventListener("click", () => switchView(b.dataset.view)));
$("searchInput").addEventListener("input", renderGallery);

/* ================= Add flow ================= */
function renderAddSlot() {
  $("addPhotoSlot").innerHTML = capFrame(addPhoto ? addPhoto.thumb : null, 160);
  $("addPhotoLabel").textContent = addPhoto ? "Neues Foto" : "Foto aufnehmen";
  $("btnSave").disabled = !addPhoto;
}
$("btnAddPhoto").addEventListener("click", () => $("addFile").click());
$("addPhotoSlot").addEventListener("click", () => $("addFile").click());
$("addFile").addEventListener("change", async e => {
  const f = e.target.files && e.target.files[0]; e.target.value = "";
  if (!f) return;
  try {
    const raw = await fileToDataUrl(f);
    const [image, thumb] = await Promise.all([resizeDataUrl(raw, STORE_DIM, STORE_Q), resizeDataUrl(raw, THUMB_DIM, THUMB_Q)]);
    addPhoto = { image, thumb };
    renderAddSlot();
  } catch (err) { toast("Foto konnte nicht verarbeitet werden."); }
});
$("btnSave").addEventListener("click", async () => {
  if (!addPhoto) return;
  $("btnSave").disabled = true;
  try {
    const sig = await computeSignature(addPhoto.image);
    const cap = {
      id: "cap_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      brand: $("addBrand").value.trim(), country: $("addCountry").value.trim(),
      createdAt: Date.now(), image: addPhoto.image, thumb: addPhoto.thumb,
      hash: sig.hash, avg: sig.avg,
    };
    await dbPutCap(cap);
    caps.push(cap);
    sessionCount++;
    $("sessionHint").style.display = "";
    $("sessionHint").textContent = "Diese Sitzung: " + sessionCount + " erfasst";
    addPhoto = null; $("addBrand").value = ""; $("addCountry").value = "";
    renderAddSlot(); renderCount();
    toast("Gespeichert · Nr. " + String(caps.length).padStart(4, "0"));
  } catch (e) {
    toast("Speichern fehlgeschlagen: " + (e.message || e));
    $("btnSave").disabled = false;
  }
});

/* ================= Compare flow ================= */
function renderCmpSlot() {
  $("cmpPhotoSlot").innerHTML = capFrame(cmpPhoto ? cmpPhoto.thumb : null, 160);
  $("cmpPhotoLabel").textContent = cmpPhoto ? "Anderes Foto" : "Fund fotografieren";
  $("btnRunCompare").disabled = !cmpPhoto || caps.length === 0;
}
$("btnCmpPhoto").addEventListener("click", () => $("cmpFile").click());
$("cmpPhotoSlot").addEventListener("click", () => $("cmpFile").click());
$("cmpFile").addEventListener("change", async e => {
  const f = e.target.files && e.target.files[0]; e.target.value = "";
  if (!f) return;
  try {
    const raw = await fileToDataUrl(f);
    const [image, thumb] = await Promise.all([resizeDataUrl(raw, STORE_DIM, STORE_Q), resizeDataUrl(raw, THUMB_DIM, THUMB_Q)]);
    cmpPhoto = { image, thumb };
    $("cmpResult").innerHTML = "";
    renderCmpSlot();
  } catch (err) { toast("Foto konnte nicht verarbeitet werden."); }
});

let lastShortlist = [];
$("btnRunCompare").addEventListener("click", async () => {
  if (!cmpPhoto || caps.length === 0) return;
  $("btnRunCompare").disabled = true;
  $("cmpResult").innerHTML = "";
  try {
    const sig = await computeSignature(cmpPhoto.image);
    const ranked = caps.map(c => ({ cap: c, s: score(sig, c) })).sort((a, b) => b.s - a.s);
    lastShortlist = ranked.slice(0, SHORTLIST);
    renderLocalResult(lastShortlist);
  } catch (e) {
    $("cmpResult").innerHTML = '<div class="result r-rust"><div class="rhead">⚠ Fehler</div><p class="rtext">' + esc(e.message || String(e)) + '</p></div>';
  } finally { $("btnRunCompare").disabled = false; }
});

function pctClass(s) { return s >= STRONG ? "pct-hi" : s >= POSSIBLE ? "pct-mid" : "pct-lo"; }
function renderLocalResult(short) {
  const best = short[0];
  const out = [];
  if (best && best.s >= STRONG) {
    out.push('<div class="result r-rust"><div class="rhead">⚠ Sehr wahrscheinlich bereits vorhanden</div>' +
      '<div class="rpair"><div class="ritem">' + capFrame(cmpPhoto.thumb, 88) + '<span>Fund</span></div>' +
      '<div class="ritem">' + capFrame(best.cap.thumb, 88) + '<span>' + (esc(best.cap.brand) || "In Sammlung") + '</span></div></div>' +
      '<p class="rtext">Bild-Ähnlichkeit: <strong>' + Math.round(best.s * 100) + '%</strong></p></div>');
  } else if (best && best.s >= POSSIBLE) {
    out.push('<div class="result r-rust" style="border-color:var(--brassd);background:var(--ink2)"><div class="rhead">≈ Möglicher Treffer – bitte prüfen</div>' +
      '<div class="rpair"><div class="ritem">' + capFrame(cmpPhoto.thumb, 88) + '<span>Fund</span></div>' +
      '<div class="ritem">' + capFrame(best.cap.thumb, 88) + '<span>' + (esc(best.cap.brand) || "In Sammlung") + '</span></div></div>' +
      '<p class="rtext">Bild-Ähnlichkeit: <strong>' + Math.round(best.s * 100) + '%</strong></p></div>');
  } else {
    out.push('<div class="result r-moss"><div class="rhead">✓ Kein ähnlicher Korken gefunden</div>' +
      '<p class="rtext">Höchste Ähnlichkeit: ' + (best ? Math.round(best.s * 100) : 0) + '% — vermutlich neu.</p>' +
      '<button class="btn b-primary wide" onclick="adoptCmpPhoto()">Zur Sammlung hinzufügen</button></div>');
  }
  out.push('<div style="width:100%;max-width:340px"><p class="hint" style="margin-bottom:6px">Ähnlichste in der Sammlung (antippen zum Öffnen):</p><div class="candrow">' +
    short.map(x => '<div class="cand" onclick="openDetail(\'' + x.cap.id + '\')">' + capFrame(x.cap.thumb, 56) +
      '<span class="pct ' + pctClass(x.s) + '">' + Math.round(x.s * 100) + '%</span></div>').join("") + '</div></div>');
  if (best && best.s >= POSSIBLE) {
    out.push('<button class="btn b-outline wide" style="max-width:340px" onclick="adoptCmpPhoto()">Trotzdem als neu speichern</button>');
  }
  out.push(apiKey
    ? '<button class="btn b-brass wide" style="max-width:340px" id="btnAi" onclick="runAi()">✨ Mit KI feinprüfen (Top ' + short.length + ')</button>'
    : '<p class="hint">Tipp: In den Einstellungen ⚙ kannst du einen API-Schlüssel hinterlegen, um Treffer zusätzlich per KI zu prüfen.</p>');
  $("cmpResult").innerHTML = out.join("");
}

async function runAi() {
  const btn = $("btnAi");
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> KI prüft…'; }
  try {
    const r = await aiCompare(cmpPhoto.image, lastShortlist.map(x => x.cap));
    let html;
    if (r.match >= 1 && r.match <= lastShortlist.length) {
      const hit = lastShortlist[r.match - 1].cap;
      html = '<div class="result r-rust"><div class="rhead">✨ KI: bereits vorhanden (' + esc(r.confidence || "?") + ')</div>' +
        '<div class="rpair"><div class="ritem">' + capFrame(cmpPhoto.thumb, 88) + '<span>Fund</span></div>' +
        '<div class="ritem">' + capFrame(hit.thumb, 88) + '<span>' + (esc(hit.brand) || "In Sammlung") + '</span></div></div>' +
        '<button class="btn b-outline wide" onclick="adoptCmpPhoto()">Trotzdem als neu speichern</button></div>';
    } else {
      html = '<div class="result r-moss"><div class="rhead">✨ KI: kein Duplikat unter den Kandidaten</div>' +
        '<button class="btn b-primary wide" onclick="adoptCmpPhoto()">Zur Sammlung hinzufügen</button></div>';
    }
    if (btn) btn.outerHTML = html;
  } catch (e) {
    toast("KI-Prüfung fehlgeschlagen: " + (e.message || e));
    if (btn) { btn.disabled = false; btn.innerHTML = '✨ Mit KI feinprüfen (Top ' + lastShortlist.length + ')'; }
  }
}
function adoptCmpPhoto() {
  if (cmpPhoto) { addPhoto = cmpPhoto; renderAddSlot(); }
  cmpPhoto = null; $("cmpResult").innerHTML = ""; renderCmpSlot();
  switchView("add");
}

/* ================= Detail sheet ================= */
function openDetail(id) {
  const cap = caps.find(c => c.id === id);
  if (!cap) return;
  $("modalRoot").innerHTML =
    '<div class="overlay" onclick="closeModal(event)">' +
    '<div class="sheet" onclick="event.stopPropagation()">' +
    '<div class="handle"></div>' +
    '<button class="sclose" onclick="closeModal()">✕</button>' +
    capFrame(cap.image || cap.thumb, 160) +
    '<div class="card" style="max-width:360px">' +
    '<label class="field"><span>Marke / Brauerei</span><input id="dBrand" value="' + esc(cap.brand) + '"></label>' +
    '<label class="field"><span>Land / Region</span><input id="dCountry" value="' + esc(cap.country) + '"></label></div>' +
    '<div class="rowgap">' +
    '<button class="btn b-rust" onclick="deleteDetail(\'' + id + '\')">🗑 Löschen</button>' +
    '<button class="btn b-primary" onclick="saveDetail(\'' + id + '\')">✓ Speichern</button>' +
    '</div></div></div>';
}
function closeModal(e) { if (!e || e.target === e.currentTarget || !e.target) $("modalRoot").innerHTML = ""; }
async function saveDetail(id) {
  const cap = caps.find(c => c.id === id);
  if (!cap) return;
  cap.brand = $("dBrand").value.trim(); cap.country = $("dCountry").value.trim();
  try { await dbPutCap(cap); toast("Aktualisiert."); }
  catch (e) { toast("Speichern fehlgeschlagen: " + (e.message || e)); }
  closeModal(); renderGallery();
}
async function deleteDetail(id) {
  if (!confirm("Diesen Kronenkorken endgültig löschen?")) return;
  try {
    await dbDeleteCap(id);
    caps = caps.filter(c => c.id !== id);
    toast("Gelöscht."); renderCount(); renderGallery();
  } catch (e) { toast("Löschen fehlgeschlagen: " + (e.message || e)); }
  closeModal();
}

/* ================= Settings ================= */
$("btnSettings").addEventListener("click", () => {
  $("modalRoot").innerHTML =
    '<div class="overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>Einstellungen</h3>' +
    '<p>Optional: Anthropic-API-Schlüssel für die KI-Feinprüfung. Wird nur auf diesem Gerät gespeichert.</p>' +
    '<label class="field"><span>API-Schlüssel</span><input id="setKey" type="password" placeholder="sk-ant-…" value="' + esc(apiKey || "") + '"></label>' +
    '<button class="btn b-primary wide" onclick="saveSettings()">✓ Speichern</button>' +
    '<div class="note">Schlüssel gibt es unter console.anthropic.com. Die KI-Prüfung kostet pro Aufruf wenige Cent. Ohne Schlüssel funktioniert der lokale Blitz-Abgleich uneingeschränkt.</div>' +
    '<button class="btn b-ghost wide" onclick="closeModal()">Schließen</button>' +
    '</div></div>';
});
async function saveSettings() {
  apiKey = $("setKey").value.trim() || null;
  await dbSetSetting("apiKey", apiKey);
  toast(apiKey ? "Schlüssel gespeichert." : "Schlüssel entfernt.");
  closeModal();
}

/* ================= Backup (export / import) ================= */
function openBackup() {
  $("modalRoot").innerHTML =
    '<div class="overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>Sicherung</h3>' +
    '<p>Deine Sammlung wird automatisch auf dem Gerät gespeichert. Eine Sicherungsdatei schützt zusätzlich vor Geräteverlust.</p>' +
    '<button class="btn b-primary wide" onclick="doExport()">⇓ Sicherung herunterladen</button>' +
    '<button class="btn b-outline wide" onclick="document.getElementById(\'impFile\').click()">⇑ Sicherung laden</button>' +
    '<input type="file" id="impFile" accept=".json,.txt,application/json,text/plain,text/*" style="display:none" onchange="doImport(event)">' +
    '<button class="btn b-rust wide" onclick="doReset()">Alles löschen</button>' +
    '<button class="btn b-ghost wide" onclick="closeModal()">Schließen</button>' +
    '</div></div>';
}
$("btnBackup").addEventListener("click", openBackup);
function doExport() {
  if (caps.length === 0) { toast("Keine Daten vorhanden."); return; }
  const payload = { version: EXPORT_VER, exportedAt: new Date().toISOString(), count: caps.length,
    caps: caps.map(c => ({ id: c.id, brand: c.brand, country: c.country, createdAt: c.createdAt, image: c.image })) };
  const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kronenkorken-" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  toast(caps.length + " Korken exportiert.");
}
async function doImport(e) {
  const f = e.target.files && e.target.files[0]; e.target.value = "";
  if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    if (!Array.isArray(data.caps)) throw new Error("Unbekanntes Format.");
    let n = 0;
    for (const c of data.caps) {
      if (!c.id || !c.createdAt || !c.image) continue;
      const thumb = await resizeDataUrl(c.image, THUMB_DIM, THUMB_Q).catch(() => c.image);
      const sig = await computeSignature(c.image).catch(() => ({ hash: "", avg: null }));
      const cap = { id: c.id, brand: c.brand || "", country: c.country || "", createdAt: c.createdAt,
        image: c.image, thumb, hash: sig.hash, avg: sig.avg };
      await dbPutCap(cap);
      const i = caps.findIndex(x => x.id === cap.id);
      if (i >= 0) caps[i] = cap; else caps.push(cap);
      n++;
    }
    renderCount(); renderGallery(); closeModal();
    toast(n + " Korken importiert.");
  } catch (err) { toast("Import fehlgeschlagen: " + (err.message || err)); }
}
async function doReset() {
  if (!confirm("Wirklich ALLE Kronenkorken endgültig löschen?")) return;
  await dbClearCaps();
  caps = []; renderCount(); renderGallery(); closeModal();
  toast("Sammlung gelöscht.");
}

/* ================= Init ================= */
(async function init() {
  try {
    db = await openDB();
    caps = await dbAllCaps();
    apiKey = await dbGetSetting("apiKey");
    // backfill signatures for caps imported/created before hashing existed
    for (const c of caps) {
      if (!c.hash && c.image) {
        try { const s = await computeSignature(c.image); c.hash = s.hash; c.avg = s.avg; await dbPutCap(c); } catch {}
      }
    }
    renderCount(); renderGallery(); renderAddSlot(); renderCmpSlot();
  } catch (e) {
    document.body.innerHTML = '<div style="padding:32px;font-family:sans-serif;color:#DCE6E4;background:#142026;height:100vh">' +
      '<h2>Speicher nicht verfügbar</h2><p>Diese App braucht einen Browser mit IndexedDB (Safari, Chrome …). Fehler: ' + esc(e.message || String(e)) + '</p></div>';
  }
})();
</script>
</body>
</html>
